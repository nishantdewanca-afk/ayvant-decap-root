[build]
  command = "npm install && npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

# Redirects
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Pretty URLs - Netlify handles this automatically for index.html files
# No additional redirects needed for clean URLs

# 301 Redirects: Old location pages to new SEO-optimized pages
[[redirects]]
  from = "/locations/vancouver/"
  to = "/locations/it-support-vancouver/"
  status = 301

[[redirects]]
  from = "/locations/surrey/"
  to = "/locations/it-support-surrey/"
  status = 301

