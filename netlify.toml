[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "18"

# Redirects
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Pretty URLs - Netlify handles this automatically for index.html files
# No additional redirects needed for clean URLs

# 404 handling
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

