backend:
  name: git-gateway
  branch: main

# Media files will be stored in the repo
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Logo for the CMS
logo_url: "https://customer-assets.emergentagent.com/job_bc-it-solutions/artifacts/vsi6eqb8_ayvant%20%282%29.png"

# Site URL
site_url: https://ayvant.ca

# Collections
collections:
  # Blog Posts
  - name: "blog"
    label: "Blog Posts"
    folder: "src/blog/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", default: "Ayvant Team" }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "A short summary for blog listing pages (1-2 sentences)" }
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false }
      - { label: "Tags", name: "tags", widget: "list", default: ["IT Support"] }
      - { label: "Featured Post", name: "featured", widget: "boolean", default: false, hint: "Show on homepage and featured section" }
      - { label: "Read Time (minutes)", name: "readTime", widget: "number", default: 5, value_type: "int" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, hint: "Drafts won't be published" }
      - label: "SEO"
        name: "seo"
        widget: "object"
        collapsed: true
        fields:
          - { label: "Meta Title", name: "metaTitle", widget: "string", required: false, hint: "Override the default title tag" }
          - { label: "Meta Description", name: "metaDescription", widget: "text", required: false, hint: "Override the default meta description" }
      - { label: "Body", name: "body", widget: "markdown" }

  # Site Settings
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "site"
        label: "Site Information"
        file: "src/_data/site.json"
        fields:
          - { label: "Site Name", name: "name", widget: "string" }
          - { label: "Site URL", name: "url", widget: "string" }
          - { label: "Site Description", name: "description", widget: "text" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - label: "Address"
            name: "address"
            widget: "object"
            fields:
              - { label: "Street", name: "street", widget: "string" }
              - { label: "City", name: "city", widget: "string" }
              - { label: "Province", name: "province", widget: "string" }
              - { label: "Postal Code", name: "postal", widget: "string" }
          - label: "Social Media"
            name: "social"
            widget: "object"
            fields:
              - { label: "LinkedIn URL", name: "linkedin", widget: "string" }
              - { label: "Facebook URL", name: "facebook", widget: "string" }
              - { label: "Twitter URL", name: "twitter", widget: "string" }
          - { label: "Client Portal URL", name: "clientPortal", widget: "string" }
          - label: "GoHighLevel Settings"
            name: "ghl"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Chat Widget ID", name: "ghlChatWidgetId", widget: "string" }
              - { label: "Newsletter Form URL", name: "ghlNewsletterForm", widget: "string" }
              - { label: "Contact Form URL", name: "ghlContactForm", widget: "string" }
              - { label: "Dark Web Form URL", name: "ghlDarkWebForm", widget: "string" }

  # Pages with editable meta tags
  - name: "pages"
    label: "Page SEO"
    files:
      - name: "homepage"
        label: "Homepage"
        file: "src/_data/pages/home.json"
        fields:
          - { label: "Meta Title", name: "metaTitle", widget: "string" }
          - { label: "Meta Description", name: "metaDescription", widget: "text" }
          - { label: "Hero Title", name: "heroTitle", widget: "string" }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "text" }
      - name: "about"
        label: "About Page"
        file: "src/_data/pages/about.json"
        fields:
          - { label: "Meta Title", name: "metaTitle", widget: "string" }
          - { label: "Meta Description", name: "metaDescription", widget: "text" }
      - name: "contact"
        label: "Contact Page"
        file: "src/_data/pages/contact.json"
        fields:
          - { label: "Meta Title", name: "metaTitle", widget: "string" }
          - { label: "Meta Description", name: "metaDescription", widget: "text" }
      - name: "cybersecurity"
        label: "Cybersecurity Page"
        file: "src/_data/pages/cybersecurity.json"
        fields:
          - { label: "Meta Title", name: "metaTitle", widget: "string" }
          - { label: "Meta Description", name: "metaDescription", widget: "text" }
      - name: "it-support"
        label: "IT Support Page"
        file: "src/_data/pages/it-support.json"
        fields:
          - { label: "Meta Title", name: "metaTitle", widget: "string" }
          - { label: "Meta Description", name: "metaDescription", widget: "text" }
      - name: "it-consulting"
        label: "IT Consulting Page"
        file: "src/_data/pages/it-consulting.json"
        fields:
          - { label: "Meta Title", name: "metaTitle", widget: "string" }
          - { label: "Meta Description", name: "metaDescription", widget: "text" }
      - name: "blog"
        label: "Blog Page"
        file: "src/_data/pages/blog.json"
        fields:
          - { label: "Meta Title", name: "metaTitle", widget: "string" }
          - { label: "Meta Description", name: "metaDescription", widget: "text" }
